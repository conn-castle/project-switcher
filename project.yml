name: ProjectSwitcher

options:
  bundleIdPrefix: com.projectswitcher
  deploymentTarget:
    macOS: "15.7"

packages:
  TOMLDecoder:
    url: https://github.com/dduan/TOMLDecoder
    exactVersion: 0.4.3

targetTemplates:
  ProjectSwitcherAppTarget:
    type: application
    platform: macOS
    sources:
      - path: ProjectSwitcherApp
    dependencies:
      - target: ProjectSwitcherCore
      - target: ProjectSwitcherAppKit
      - package: TOMLDecoder
    settings:
      base:
        INFOPLIST_FILE: ProjectSwitcherApp/Info.plist
        MARKETING_VERSION: "0.2.2"
        CURRENT_PROJECT_VERSION: 16
        CODE_SIGN_ENTITLEMENTS: release/ProjectSwitcher.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  ProjectSwitcher:
    templates:
      - ProjectSwitcherAppTarget
    settings:
      base:
        PRODUCT_NAME: ProjectSwitcher
        PRODUCT_BUNDLE_IDENTIFIER: com.projectswitcher.ProjectSwitcher
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Developer ID Application
          ENABLE_HARDENED_RUNTIME: YES

  ProjectSwitcherDev:
    templates:
      - ProjectSwitcherAppTarget
    settings:
      base:
        PRODUCT_NAME: ProjectSwitcher Dev
        PRODUCT_BUNDLE_IDENTIFIER: com.projectswitcher.ProjectSwitcher.dev

  ProjectSwitcherCore:
    type: framework.static
    platform: macOS
    sources:
      - path: ProjectSwitcherCore
    dependencies:
      - package: TOMLDecoder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  ProjectSwitcherAppKit:
    type: framework.static
    platform: macOS
    sources:
      - path: ProjectSwitcherAppKit
    dependencies:
      - target: ProjectSwitcherCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  ProjectSwitcherCLICore:
    type: framework.static
    platform: macOS
    sources:
      - path: ProjectSwitcherCLICore
    dependencies:
      - target: ProjectSwitcherCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  ProjectSwitcherCLI:
    type: tool
    platform: macOS
    productName: pswitcher
    sources:
      - path: ProjectSwitcherCLI
    dependencies:
      - target: ProjectSwitcherCLICore
      - target: ProjectSwitcherCore
      - target: ProjectSwitcherAppKit
      - package: TOMLDecoder
    settings:
      base:
        PRODUCT_NAME: pswitcher
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Developer ID Application
          ENABLE_HARDENED_RUNTIME: YES

  ProjectSwitcherCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ProjectSwitcherCoreTests
    dependencies:
      - target: ProjectSwitcherCore
      - target: ProjectSwitcherAppKit
      - package: TOMLDecoder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ProjectSwitcherAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ProjectSwitcherAppTests
    dependencies:
      - target: ProjectSwitcher
      - target: ProjectSwitcherCore
      - target: ProjectSwitcherAppKit
      - package: TOMLDecoder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ProjectSwitcherCLITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ProjectSwitcherCLITests
    dependencies:
      - target: ProjectSwitcherCLICore
      - target: ProjectSwitcherCore
      - package: TOMLDecoder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ProjectSwitcher:
    build:
      targets:
        ProjectSwitcher: all
        ProjectSwitcherCLI: all
        ProjectSwitcherCoreTests: [test]
    test:
      testPlans:
        - path: TestPlans/ProjectSwitcher.xctestplan
          defaultPlan: true
      targets:
        - name: ProjectSwitcherCoreTests
        - name: ProjectSwitcherAppTests
        - name: ProjectSwitcherCLITests

  ProjectSwitcherDev:
    build:
      targets:
        ProjectSwitcherDev: all
